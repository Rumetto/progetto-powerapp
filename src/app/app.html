<div class="app-container" style="--accent: #FD5A02; --accent-hover: #ff7733;">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <img src="/logo-powerapp.png" alt="Logo">
      </div>
    </div>

    <nav class="sidebar-nav">
      <ul>
        <li>
          <a
            routerLink="/products"
            [class.active]="isProductsActive()">
            Prodotti
          </a>
        </li>

        <li>
          <a
            routerLink="/categories"
            [class.active]="isCategoriesActive()">
            Categorie
          </a>
        </li>
      </ul>
    </nav>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
