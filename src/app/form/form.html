<div class="titolo-form">
  <h1>Aggiungi un nuovo prodotto</h1>
</div>



<form [formGroup]="form" (ngSubmit)="invia()" class="form-container">
  <div class="field">
    <label for="title">Titolo</label>
    <input id="title" type="text" formControlName="title" />
    <small *ngIf="form.get('title')?.touched && form.get('title')?.invalid">
      Il titolo è obbligatorio
    </small>
  </div>

  <div class="field">
    <label for="price">Prezzo</label>
    <input id="price" type="number" step="0.01" formControlName="price" />
    <small *ngIf="form.get('price')?.touched && form.get('price')?.invalid">
      Il prezzo è obbligatorio
    </small>
  </div>

  <div class="field">
    <label for="description">Descrizione</label>
    <textarea id="description" rows="4" formControlName="description"></textarea>
    <small *ngIf="form.get('description')?.touched && form.get('description')?.invalid">
      La descrizione è obbligatoria
    </small>
  </div>

  <div class="field">
    <label for="category">Categoria</label>
    <input id="category" type="text" formControlName="category" />
    <small *ngIf="form.get('category')?.touched && form.get('category')?.invalid">
      La categoria è obbligatoria
    </small>
  </div>

  <div class="field">
    <label for="image">URL immagine</label>
    <input id="image" type="text" formControlName="image" />
    <small *ngIf="form.get('image')?.touched && form.get('image')?.invalid">
      L'immagine è obbligatoria
    </small>
  </div>

  <button type="submit" [disabled]="isLoading()">
    {{ isLoading() ? 'Salvataggio...' : 'Salva prodotto' }}
  </button>

  <p *ngIf="showSuccess()">Prodotto salvato con successo.</p>
</form>
